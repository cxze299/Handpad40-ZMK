# USB-only matrix debug profile.
CONFIG_ZMK_USB=y
# CONFIG_ZMK_BLE is not set
# CONFIG_ZMK_SLEEP is not set

# Poll the matrix continuously while debugging. This avoids interrupt wiring
# assumptions hiding a diode-direction or GPIO mapping issue.
CONFIG_ZMK_KSCAN_MATRIX_POLLING=y
CONFIG_ZMK_KSCAN_MATRIX_WAIT_BEFORE_INPUTS=5
CONFIG_ZMK_KSCAN_MATRIX_WAIT_BETWEEN_OUTPUTS=5
